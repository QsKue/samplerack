name: main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test (stable)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Format
      run: cargo fmt --all --check
    - name: Clippy (default, FFT-free)
      run: cargo clippy --all-targets -- -D warnings
    - name: Clippy (rubato backend)
      run: cargo clippy --all-targets --features rubato -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Test (default, FFT-free)
      run: cargo test --verbose
    - name: Test (rubato backend)
      run: cargo test --verbose --features rubato

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.85.0
    # Verify the whole crate builds on the edition-2024 floor.
    - name: Check on MSRV
      run: cargo check --all-targets
